<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地球Online - 模拟人生</title>
    <style>
        :root {
            --bg: #0a0e17;
            --card-bg: #141a24;
            --card-bg2: #1a2030;
            --text: #e0e0e0;
            --text-secondary: #a0a8b8;
            --accent: #4da6ff;
            --accent2: #ff6b9d;
            --gold: #f0c060;
            --green: #4ecb71;
            --purple: #a78bfa;
            --orange: #f59e4b;
            --red: #ef4444;
            --pink: #ec4899;
            --border: #2a3040;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 星空Canvas */
        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 地球装饰 */
        .earth-decoration {
            position: fixed;
            top: -120px;
            right: -120px;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%,
                    rgba(70, 160, 240, 0.12) 0%,
                    rgba(30, 100, 180, 0.06) 35%,
                    rgba(10, 50, 100, 0.03) 60%,
                    transparent 70%);
            z-index: 0;
            pointer-events: none;
            animation: earthPulse 8s ease-in-out infinite;
        }
        .earth-decoration2 {
            position: fixed;
            bottom: -80px;
            left: -80px;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 40%,
                    rgba(100, 200, 160, 0.08) 0%,
                    rgba(40, 120, 80, 0.04) 40%,
                    transparent 65%);
            z-index: 0;
            pointer-events: none;
            animation: earthPulse 10s ease-in-out infinite reverse;
        }
        @keyframes earthPulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.7;
            }
            50% {
                transform: scale(1.15);
                opacity: 1;
            }
        }

        /* 主容器 */
        .game-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 720px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* 标题栏 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 10px;
        }
        .header .title-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .logo-icon {
            font-size: 2rem;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, #4da6ff, #7dd3fc, #4da6ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            to {
                background-position: 200% center;
            }
        }
        .header .age-display {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f0c060;
            background: rgba(240, 192, 96, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(240, 192, 96, 0.25);
            white-space: nowrap;
        }
        .header .year-display {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* 主布局 */
        .main-layout {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        @media (max-width: 600px) {
            .main-layout {
                flex-direction: column;
            }
        }

        /* 状态面板 */
        .stats-panel {
            flex: 1;
            min-width: 260px;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 18px 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .stats-panel h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }
        .stat-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stat-icon {
            font-size: 1.3rem;
            width: 28px;
            text-align: center;
            flex-shrink: 0;
        }
        .stat-info {
            flex: 1;
            min-width: 0;
        }
        .stat-label {
            font-size: 0.78rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3px;
        }
        .stat-value {
            font-weight: 700;
            font-size: 0.82rem;
        }
        .stat-bar-bg {
            height: 8px;
            background: #1e2a3a;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .stat-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.6s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            position: relative;
        }
        .stat-bar-fill.health {
            background: linear-gradient(90deg, #27ae60, #4ecb71);
            box-shadow: 0 0 8px rgba(78, 203, 113, 0.35);
        }
        .stat-bar-fill.happiness {
            background: linear-gradient(90deg, #f59e4b, #fbbf24);
            box-shadow: 0 0 8px rgba(251, 191, 36, 0.35);
        }
        .stat-bar-fill.intelligence {
            background: linear-gradient(90deg, #7c3aed, #a78bfa);
            box-shadow: 0 0 8px rgba(167, 139, 250, 0.35);
        }
        .stat-bar-fill.wealth {
            background: linear-gradient(90deg, #d4a017, #f0c060);
            box-shadow: 0 0 8px rgba(240, 192, 96, 0.35);
        }
        .stat-bar-fill.social {
            background: linear-gradient(90deg, #db2777, #f472b6);
            box-shadow: 0 0 8px rgba(244, 114, 182, 0.35);
        }
        .career-badge {
            display: inline-block;
            background: rgba(77, 166, 255, 0.15);
            color: #7dbfff;
            padding: 4px 12px;
            border-radius: 14px;
            font-size: 0.78rem;
            font-weight: 600;
            border: 1px solid rgba(77, 166, 255, 0.3);
            margin-top: 2px;
        }
        .relationship-badge {
            display: inline-block;
            background: rgba(236, 72, 153, 0.12);
            color: #f9a8d4;
            padding: 4px 12px;
            border-radius: 14px;
            font-size: 0.78rem;
            font-weight: 600;
            border: 1px solid rgba(236, 72, 153, 0.3);
            margin-top: 2px;
            margin-left: 6px;
        }

        /* 行动面板 */
        .actions-panel {
            flex: 1;
            min-width: 260px;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 18px 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 9px;
        }
        .actions-panel h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }
        .action-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: var(--card-bg2);
            color: var(--text);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            text-align: left;
            width: 100%;
            font-family: inherit;
        }
        .action-btn:hover {
            border-color: #4da6ff;
            background: #1c2a3d;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
        }
        .action-btn:active {
            transform: scale(0.97);
            transition: 0.1s;
        }
        .action-btn .action-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .action-btn .action-info {
            flex: 1;
            min-width: 0;
        }
        .action-btn .action-name {
            font-weight: 600;
            font-size: 0.88rem;
        }
        .action-btn .action-hint {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 1px;
        }
        .action-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(30%);
        }
        .action-btn .risk-tag {
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }
        .risk-high {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        .risk-medium {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        /* 日志面板 */
        .log-panel {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 18px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .log-panel h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin-bottom: 4px;
            position: sticky;
            top: 0;
            background: var(--card-bg);
            padding-bottom: 8px;
            z-index: 1;
        }
        .log-entry {
            font-size: 0.8rem;
            padding: 8px 12px;
            border-radius: 8px;
            background: var(--card-bg2);
            border-left: 3px solid #4da6ff;
            animation: slideIn 0.35s ease-out;
            line-height: 1.4;
        }
        .log-entry.positive {
            border-left-color: #4ecb71;
        }
        .log-entry.negative {
            border-left-color: #ef4444;
        }
        .log-entry.neutral {
            border-left-color: #f0c060;
        }
        .log-entry.special {
            border-left-color: #a78bfa;
            background: rgba(167, 139, 250, 0.08);
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-16px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .log-panel::-webkit-scrollbar {
            width: 4px;
        }
        .log-panel::-webkit-scrollbar-track {
            background: transparent;
        }
        .log-panel::-webkit-scrollbar-thumb {
            background: #2a3040;
            border-radius: 10px;
        }

        /* 按钮 */
        .btn-reset {
            display: block;
            width: 100%;
            padding: 12px;
            border-radius: var(--radius-sm);
            border: 1.5px solid #ef4444;
            background: rgba(239, 68, 68, 0.08);
            color: #f87171;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            transition: var(--transition);
            font-family: inherit;
        }
        .btn-reset:hover {
            background: rgba(239, 68, 68, 0.18);
            border-color: #f87171;
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.2);
        }

        /* 结局弹窗 */
        .ending-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .ending-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 30px 24px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 2px solid var(--border);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.85) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .ending-card .ending-icon {
            font-size: 4rem;
            margin-bottom: 12px;
            animation: float 2s ease-in-out infinite;
        }
        .ending-card h2 {
            font-size: 1.6rem;
            margin-bottom: 6px;
            letter-spacing: 0.03em;
        }
        .ending-card .ending-type {
            font-size: 0.9rem;
            color: #f0c060;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .ending-card .ending-stats {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
            line-height: 1.6;
        }
        .ending-card button {
            padding: 12px 28px;
            border-radius: 24px;
            border: none;
            background: linear-gradient(135deg, #4da6ff, #3d8ce0);
            color: #fff;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            transition: var(--transition);
            font-family: inherit;
        }
        .ending-card button:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 28px rgba(77, 166, 255, 0.35);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            background: #1a2030;
            border: 1.5px solid #f0c060;
            color: #f0c060;
            padding: 10px 22px;
            border-radius: 24px;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.03em;
            animation: toastIn 0.4s ease-out, toastOut 0.4s ease-in 2.2s forwards;
            pointer-events: none;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-30px);
            }
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .game-container {
                padding: 10px;
                gap: 10px;
            }
            .header {
                padding: 12px 14px;
            }
            .header h1 {
                font-size: 1.2rem;
            }
            .header .age-display {
                font-size: 0.95rem;
                padding: 5px 10px;
            }
            .stats-panel,
            .actions-panel {
                padding: 14px 12px;
                gap: 8px;
            }
            .action-btn {
                padding: 10px 12px;
                font-size: 0.82rem;
            }
            .action-btn .action-icon {
                font-size: 1.3rem;
            }
            .log-panel {
                max-height: 150px;
                padding: 12px;
            }
            .ending-card {
                padding: 22px 16px;
            }
            .ending-card h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <!-- 星空背景 -->
    <canvas id="starCanvas"></canvas>

    <!-- 地球装饰 -->
    <div class="earth-decoration"></div>
    <div class="earth-decoration2"></div>

    <!-- 主游戏容器 -->
    <div class="game-container" id="gameContainer">
        <!-- 头部 -->
        <div class="header">
            <div class="title-group">
                <span class="logo-icon">🌍</span>
                <div>
                    <h1>地球Online</h1>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                <span class="year-display" id="yearDisplay">公元2024年</span>
                <span class="age-display" id="ageDisplay">🎂 18岁</span>
            </div>
        </div>

        <!-- 主布局 -->
        <div class="main-layout">
            <!-- 状态面板 -->
            <div class="stats-panel" id="statsPanel">
                <h3>📊 角色状态</h3>
                <div class="stat-row">
                    <span class="stat-icon">❤️</span>
                    <div class="stat-info">
                        <div class="stat-label"><span>健康</span><span class="stat-value" id="healthVal">80</span></div>
                        <div class="stat-bar-bg"><div class="stat-bar-fill health" id="healthBar" style="width:80%"></div></div>
                    </div>
                </div>
                <div class="stat-row">
                    <span class="stat-icon">😊</span>
                    <div class="stat-info">
                        <div class="stat-label"><span>快乐</span><span class="stat-value" id="happinessVal">70</span></div>
                        <div class="stat-bar-bg"><div class="stat-bar-fill happiness" id="happinessBar" style="width:70%"></div></div>
                    </div>
                </div>
                <div class="stat-row">
                    <span class="stat-icon">🧠</span>
                    <div class="stat-info">
                        <div class="stat-label"><span>智力</span><span class="stat-value" id="intelligenceVal">30</span></div>
                        <div class="stat-bar-bg"><div class="stat-bar-fill intelligence" id="intelligenceBar" style="width:30%"></div></div>
                    </div>
                </div>
                <div class="stat-row">
                    <span class="stat-icon">💰</span>
                    <div class="stat-info">
                        <div class="stat-label"><span>财富 (万元)</span><span class="stat-value" id="wealthVal">1</span></div>
                        <div class="stat-bar-bg"><div class="stat-bar-fill wealth" id="wealthBar" style="width:1%"></div></div>
                    </div>
                </div>
                <div class="stat-row">
                    <span class="stat-icon">🤝</span>
                    <div class="stat-info">
                        <div class="stat-label"><span>社交</span><span class="stat-value" id="socialVal">40</span></div>
                        <div class="stat-bar-bg"><div class="stat-bar-fill social" id="socialBar" style="width:40%"></div></div>
                    </div>
                </div>
                <div style="margin-top:4px;">
                    <span class="career-badge" id="careerBadge">💼 待业</span>
                    <span class="relationship-badge" id="relBadge">💔 单身</span>
                </div>
            </div>

            <!-- 行动面板 -->
            <div class="actions-panel" id="actionsPanel">
                <h3>🎯 年度行动 (选择一项)</h3>
                <button class="action-btn" onclick="performAction('work')" id="btnWork">
                    <span class="action-icon">💼</span>
                    <div class="action-info">
                        <div class="action-name">努力工作</div>
                        <div class="action-hint">财富↑ 健康↓ 快乐↓</div>
                    </div>
                </button>
                <button class="action-btn" onclick="performAction('study')" id="btnStudy">
                    <span class="action-icon">📚</span>
                    <div class="action-info">
                        <div class="action-name">学习进修</div>
                        <div class="action-hint">智力↑ 财富↓ 社交↑</div>
                    </div>
                </button>
                <button class="action-btn" onclick="performAction('exercise')" id="btnExercise">
                    <span class="action-icon">🏃</span>
                    <div class="action-info">
                        <div class="action-name">锻炼身体</div>
                        <div class="action-hint">健康↑ 快乐↑</div>
                    </div>
                </button>
                <button class="action-btn" onclick="performAction('socialize')" id="btnSocial">
                    <span class="action-icon">🎉</span>
                    <div class="action-info">
                        <div class="action-name">社交聚会</div>
                        <div class="action-hint">社交↑ 快乐↑ 财富↓</div>
                    </div>
                </button>
                <button class="action-btn" onclick="performAction('rest')" id="btnRest">
                    <span class="action-icon">🌴</span>
                    <div class="action-info">
                        <div class="action-name">休息放松</div>
                        <div class="action-hint">快乐↑ 健康↑ 社交↓</div>
                    </div>
                </button>
                <button class="action-btn" onclick="performAction('venture')" id="btnVenture">
                    <span class="action-icon">🚀</span>
                    <div class="action-info">
                        <div class="action-name">创业投资</div>
                        <div class="action-hint">高风险高回报 (需智力≥35)</div>
                    </div>
                    <span class="risk-tag risk-high">高风险</span>
                </button>
            </div>
        </div>

        <!-- 日志面板 -->
        <div class="log-panel" id="logPanel">
            <h3>📜 人生日志</h3>
            <div id="logEntries">
                <div class="log-entry neutral">🌟 你的人生开始了！18岁的你站在人生的十字路口，未来充满无限可能。</div>
            </div>
        </div>

        <!-- 重置按钮 -->
        <button class="btn-reset" onclick="resetGame()">🔄 重新开始人生</button>
    </div>

    <!-- Toast容器 -->
    <div id="toastContainer"></div>

    <!-- 结局弹窗容器 -->
    <div id="endingContainer"></div>

    <script>
        (function() {
            // ==================== 星空背景 ====================
            const canvas = document.getElementById('starCanvas');
            const ctx = canvas.getContext('2d');
            let stars = [];
            const STAR_COUNT = 150;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', () => {
                resizeCanvas();
                initStars();
            });

            function initStars() {
                stars = [];
                for (let i = 0; i < STAR_COUNT; i++) {
                    stars.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        r: Math.random() * 1.6 + 0.4,
                        twinkleSpeed: Math.random() * 0.02 + 0.005,
                        twinkleOffset: Math.random() * Math.PI * 2,
                        baseAlpha: Math.random() * 0.6 + 0.4,
                    });
                }
            }
            initStars();

            function drawStars(time) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(star => {
                    const alpha = star.baseAlpha + Math.sin(time * star.twinkleSpeed + star.twinkleOffset) *
                        0.35;
                    const clampedAlpha = Math.max(0.15, Math.min(1, alpha));
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(200,220,255,${clampedAlpha})`;
                    ctx.fill();
                    // 微光晕
                    if (star.r > 1.2 && clampedAlpha > 0.6) {
                        ctx.beginPath();
                        ctx.arc(star.x, star.y, star.r * 2.5, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(180,210,255,${clampedAlpha * 0.12})`;
                        ctx.fill();
                    }
                });
                requestAnimationFrame(drawStars);
            }
            requestAnimationFrame(drawStars);

            // ==================== 游戏状态 ====================
            const gameState = {
                age: 18,
                year: 2024,
                health: 80,
                happiness: 70,
                intelligence: 30,
                wealth: 1, // 万元
                social: 40,
                career: '待业',
                careerLevel: 0,
                relationship: '单身',
                relationshipYears: 0,
                hasChildren: false,
                achievements: [],
                eventLog: [],
                gameOver: false,
                gameEnding: null,
                consecutiveHealthLow: 0,
                consecutiveHappinessLow: 0,
                turnsSinceSocial: 0,
            };

            function clamp(val, min, max) {
                return Math.max(min, Math.min(max, val));
            }

            function getCareerByIntelligence(intel) {
                if (intel >= 90) return { name: '行业领袖', level: 5, baseIncome: 55 };
                if (intel >= 70) return { name: '精英人士', level: 4, baseIncome: 30 };
                if (intel >= 50) return { name: '专业人士', level: 3, baseIncome: 14 };
                if (intel >= 30) return { name: '公司白领', level: 2, baseIncome: 6 };
                return { name: '普通打工者', level: 1, baseIncome: 2.5 };
            }

            function updateCareer() {
                const careerInfo = getCareerByIntelligence(gameState.intelligence);
                if (careerInfo.name !== gameState.career) {
                    const oldCareer = gameState.career;
                    gameState.career = careerInfo.name;
                    gameState.careerLevel = careerInfo.level;
                    if (oldCareer !== '待业' && gameState.careerLevel > getCareerByIntelligence(gameState.intelligence -
                            5).level) {
                        addLog(`🎉 恭喜！你晋升为【${careerInfo.name}】！`, 'positive');
                        showToast('🎉 职业晋升！');
                    }
                } else {
                    gameState.careerLevel = careerInfo.level;
                }
            }

            function getWealthPercent() {
                return Math.min(100, Math.max(0, gameState.wealth <= 0 ? 0 : Math.log10(gameState.wealth + 1) * 22));
            }

            // ==================== UI更新 ====================
            function updateAllUI() {
                // 年龄和年份
                document.getElementById('ageDisplay').textContent = `🎂 ${gameState.age}岁`;
                document.getElementById('yearDisplay').textContent = `公元${gameState.year}年`;

                // 属性条
                document.getElementById('healthVal').textContent = Math.round(gameState.health);
                document.getElementById('healthBar').style.width = gameState.health + '%';
                document.getElementById('happinessVal').textContent = Math.round(gameState.happiness);
                document.getElementById('happinessBar').style.width = gameState.happiness + '%';
                document.getElementById('intelligenceVal').textContent = Math.round(gameState.intelligence);
                document.getElementById('intelligenceBar').style.width = gameState.intelligence + '%';
                const wp = getWealthPercent();
                document.getElementById('wealthVal').textContent = gameState.wealth < 0 ? Math.round(gameState.wealth) :
                    Math.round(gameState.wealth);
                document.getElementById('wealthBar').style.width = wp + '%';
                document.getElementById('socialVal').textContent = Math.round(gameState.social);
                document.getElementById('socialBar').style.width = gameState.social + '%';

                // 职业和关系
                document.getElementById('careerBadge').textContent = '💼 ' + gameState.career;
                const relEmoji = gameState.relationship === '已婚' ? '💍' : gameState.relationship === '恋爱中' ? '💕' : '💔';
                const relText = gameState.relationship === '已婚' && gameState.hasChildren ? '已婚 · 有孩子' : gameState
                    .relationship;
                document.getElementById('relBadge').textContent = relEmoji + ' ' + relText;

                // 创业按钮状态
                const btnVenture = document.getElementById('btnVenture');
                if (gameState.intelligence < 35) {
                    btnVenture.classList.add('disabled');
                } else {
                    btnVenture.classList.remove('disabled');
                }

                // 游戏结束禁用行动
                const allBtns = document.querySelectorAll('.action-btn');
                if (gameState.gameOver) {
                    allBtns.forEach(b => b.classList.add('disabled'));
                }
            }

            function addLog(message, type = 'neutral') {
                gameState.eventLog.unshift({ message, type, year: gameState.year });
                const logEntries = document.getElementById('logEntries');
                const entryDiv = document.createElement('div');
                entryDiv.className = `log-entry ${type}`;
                entryDiv.textContent = `[${gameState.year}年] ${message}`;
                logEntries.insertBefore(entryDiv, logEntries.firstChild);
                // 限制日志显示数量
                while (logEntries.children.length > 50) {
                    logEntries.removeChild(logEntries.lastChild);
                }
            }

            function showToast(message) {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                container.appendChild(toast);
                setTimeout(() => {
                    if (toast.parentNode) toast.parentNode.removeChild(toast);
                }, 2600);
            }

            // ==================== 随机事件系统 ====================
            function triggerRandomEvent() {
                const rand = Math.random();
                const age = gameState.age;
                const health = gameState.health;
                const wealth = gameState.wealth;
                const happiness = gameState.happiness;
                const intelligence = gameState.intelligence;
                const social = gameState.social;

                // 根据状态调整事件概率
                const events = [];

                // 健康相关事件
                if (health < 30 && Math.random() < 0.5) {
                    events.push({
                        message: '🏥 你因健康问题住院治疗，花费了不少医疗费。',
                        effects: { health: +15, wealth: -4, happiness: -8 },
                        type: 'negative',
                        weight: 5
                    });
                }
                if (health < 15 && Math.random() < 0.6) {
                    events.push({
                        message: '🚨 严重的健康危机！你被紧急送医，所幸抢救及时。',
                        effects: { health: +20, wealth: -10, happiness: -15 },
                        type: 'negative',
                        weight: 8
                    });
                }

                // 财富相关事件
                if (wealth > 20 && Math.random() < 0.3) {
                    events.push({
                        message: '📈 你的投资获得了不错的回报！',
                        effects: { wealth: +8, happiness: +6 },
                        type: 'positive',
                        weight: 3
                    });
                }
                if (wealth > 50 && Math.random() < 0.25) {
                    events.push({
                        message: '🏠 你成功购入一处优质房产，资产增值。',
                        effects: { wealth: +15, happiness: +5, social: +3 },
                        type: 'positive',
                        weight: 3
                    });
                }
                if (wealth < -5 && Math.random() < 0.4) {
                    events.push({
                        message: '💸 债主上门讨债，你不得不变卖物品还债。',
                        effects: { wealth: +3, happiness: -10, health: -3 },
                        type: 'negative',
                        weight: 4
                    });
                }

                // 社交/关系事件
                if (social > 60 && gameState.relationship === '单身' && age >= 20 && Math.random() < 0.35) {
                    events.push({
                        message: '💕 在一次社交活动中，你遇到了让你心动的人，你们开始恋爱了！',
                        effects: { happiness: +12, social: +5, relationship: '恋爱中', relationshipYears: 0 },
                        type: 'special',
                        weight: 4
                    });
                }
                if (gameState.relationship === '恋爱中' && gameState.relationshipYears >= 2 && Math.random() < 0.4 &&
                    social > 45) {
                    events.push({
                        message: '💍 你和恋人步入婚姻殿堂！人生进入新阶段。',
                        effects: { happiness: +15, social: +8, wealth: -5, relationship: '已婚', relationshipYears: 0 },
                        type: 'special',
                        weight: 3
                    });
                }
                if (gameState.relationship === '已婚' && gameState.relationshipYears >= 2 && !gameState.hasChildren && Math
                    .random() < 0.35) {
                    events.push({
                        message: '👶 你们迎来了爱情的结晶！家里多了一个小天使。',
                        effects: { happiness: +10, wealth: -3, hasChildren: true },
                        type: 'special',
                        weight: 3
                    });
                }
                if (gameState.relationship === '已婚' && Math.random() < 0.08 && happiness < 30) {
                    events.push({
                        message: '💔 婚姻出现裂痕，你们最终选择了离婚。',
                        effects: { happiness: -18, social: -10, relationship: '单身', relationshipYears: 0,
                            hasChildren: false },
                        type: 'negative',
                        weight: 2
                    });
                }
                if (gameState.relationship === '恋爱中' && Math.random() < 0.1 && happiness < 25) {
                    events.push({
                        message: '🥀 感情出现危机，你们分手了。',
                        effects: { happiness: -12, social: -5, relationship: '单身', relationshipYears: 0 },
                        type: 'negative',
                        weight: 2
                    });
                }

                // 通用随机事件
                events.push({
                    message: '🎁 你在路上捡到一个钱包并归还失主，失主感激地给了你一笔酬金。',
                    effects: { wealth: +2, happiness: +4, social: +3 },
                    type: 'positive',
                    weight: 2
                });
                events.push({
                    message: '🌧️ 今年遭遇了严重的自然灾害，你的财产受到一定损失。',
                    effects: { wealth: -3, happiness: -5 },
                    type: 'negative',
                    weight: 2
                });
                events.push({
                    message: '🎓 你参加了一个专业培训课程，收获颇丰。',
                    effects: { intelligence: +4, social: +2, wealth: -1 },
                    type: 'positive',
                    weight: 2
                });
                events.push({
                    message: '🤝 你结识了一位贵人，为你的职业发展提供了宝贵建议。',
                    effects: { intelligence: +3, social: +5, happiness: +3 },
                    type: 'positive',
                    weight: 2
                });
                events.push({
                    message: '🎰 你在彩票中中了一笔小奖！',
                    effects: { wealth: +5, happiness: +7 },
                    type: 'positive',
                    weight: 1.5
                });
                events.push({
                    message: '🦠 一场流感席卷全城，你也未能幸免。',
                    effects: { health: -8, happiness: -4 },
                    type: 'negative',
                    weight: 2
                });
                events.push({
                    message: '📱 你的手机被偷了，不得不买一部新的。',
                    effects: { wealth: -0.8, happiness: -3 },
                    type: 'negative',
                    weight: 1.5
                });
                events.push({
                    message: '🌟 你在社交媒体上发布的内容意外走红，获得了很多关注。',
                    effects: { social: +6, happiness: +5 },
                    type: 'positive',
                    weight: 1.5
                });

                // 按权重筛选
                const totalWeight = events.reduce((sum, e) => sum + e.weight, 0);
                let roll = Math.random() * totalWeight;
                let chosenEvent = null;
                for (const ev of events) {
                    roll -= ev.weight;
                    if (roll <= 0) {
                        chosenEvent = ev;
                        break;
                    }
                }
                if (!chosenEvent && events.length > 0) chosenEvent = events[events.length - 1];

                if (chosenEvent) {
                    applyEventEffects(chosenEvent);
                    addLog(chosenEvent.message, chosenEvent.type);
                    if (chosenEvent.type === 'special') showToast('✨ 人生大事发生！');
                }
            }

            function applyEventEffects(event) {
                const eff = event.effects;
                if (eff.health) gameState.health = clamp(gameState.health + eff.health, 0, 100);
                if (eff.happiness) gameState.happiness = clamp(gameState.happiness + eff.happiness, 0, 100);
                if (eff.intelligence) gameState.intelligence = clamp(gameState.intelligence + eff.intelligence, 0, 100);
                if (eff.wealth !== undefined) gameState.wealth += eff.wealth;
                if (eff.social) gameState.social = clamp(gameState.social + eff.social, 0, 100);
                if (eff.relationship) {
                    gameState.relationship = eff.relationship;
                    gameState.relationshipYears = eff.relationshipYears || 0;
                }
                if (eff.hasChildren !== undefined) gameState.hasChildren = eff.hasChildren;
                updateCareer();
            }

            // ==================== 自然衰减 ====================
            function applyNaturalDecay() {
                // 健康衰减：年龄越大衰减越快
                let healthDecay = 1;
                if (gameState.age > 30) healthDecay = 1.5;
                if (gameState.age > 45) healthDecay = 2.5;
                if (gameState.age > 55) healthDecay = 4;
                if (gameState.age > 65) healthDecay = 6;
                gameState.health = clamp(gameState.health - healthDecay, 0, 100);

                // 快乐自然衰减
                const happinessDecay = 1.5 + (gameState.age > 40 ? 1 : 0) + (gameState.age > 55 ? 1.5 : 0);
                gameState.happiness = clamp(gameState.happiness - happinessDecay, 0, 100);

                // 社交衰减
                gameState.turnsSinceSocial++;
                if (gameState.turnsSinceSocial >= 2) {
                    gameState.social = clamp(gameState.social - 3, 0, 100);
                }
                if (gameState.turnsSinceSocial >= 4) {
                    gameState.social = clamp(gameState.social - 5, 0, 100);
                }

                // 关系年限
                if (gameState.relationship !== '单身') {
                    gameState.relationshipYears++;
                }

                // 追踪低属性状态
                if (gameState.health < 15) gameState.consecutiveHealthLow++;
                else gameState.consecutiveHealthLow = 0;
                if (gameState.happiness < 10) gameState.consecutiveHappinessLow++;
                else gameState.consecutiveHappinessLow = 0;
            }

            // ==================== 行动处理 ====================
            function performAction(action) {
                if (gameState.gameOver) return;

                // 先应用自然衰减
                applyNaturalDecay();

                let logMsg = '';
                let logType = 'neutral';
                const careerInfo = getCareerByIntelligence(gameState.intelligence);

                switch (action) {
                    case 'work':
                        gameState.turnsSinceSocial++;
                        const incomeBase = careerInfo.baseIncome;
                        const incomeVar = incomeBase * (0.6 + Math.random() * 0.8);
                        const workIncome = Math.round(incomeVar * 10) / 10;
                        const healthCost = 2 + Math.floor(Math.random() * 4);
                        const happyCost = 2 + Math.floor(Math.random() * 4);
                        gameState.wealth += workIncome;
                        gameState.health = clamp(gameState.health - healthCost, 0, 100);
                        gameState.happiness = clamp(gameState.happiness - happyCost, 0, 100);
                        gameState.intelligence = clamp(gameState.intelligence + (Math.random() < 0.3 ? 1 : 0), 0, 100);
                        logMsg = `💼 你作为【${gameState.career}】辛勤工作一年，收入${workIncome}万元。健康-${healthCost}，快乐-${happyCost}。`;
                        logType = 'neutral';
                        break;

                    case 'study':
                        gameState.turnsSinceSocial++;
                        const intelGain = 4 + Math.floor(Math.random() * 7);
                        const studyCost = 0.5 + Math.random() * 2.5;
                        const studyHappyCost = 2 + Math.floor(Math.random() * 3);
                        gameState.intelligence = clamp(gameState.intelligence + intelGain, 0, 100);
                        gameState.wealth -= Math.round(studyCost * 10) / 10;
                        gameState.happiness = clamp(gameState.happiness - studyHappyCost, 0, 100);
                        gameState.social = clamp(gameState.social + (1 + Math.floor(Math.random() * 2)), 0, 100);
                        updateCareer();
                        logMsg = `📚 你潜心学习一年，智力+${intelGain}。学费支出${Math.round(studyCost*10)/10}万元。`;
                        logType = 'positive';
                        break;

                    case 'exercise':
                        gameState.turnsSinceSocial++;
                        const healthGain = 5 + Math.floor(Math.random() * 7);
                        const happyGain = 2 + Math.floor(Math.random() * 4);
                        gameState.health = clamp(gameState.health + healthGain, 0, 100);
                        gameState.happiness = clamp(gameState.happiness + happyGain, 0, 100);
                        gameState.intelligence = clamp(gameState.intelligence + (Math.random() < 0.2 ? 1 : 0), 0, 100);
                        logMsg = `🏃 你坚持锻炼一年，健康+${healthGain}，快乐+${happyGain}。`;
                        logType = 'positive';
                        break;

                    case 'socialize':
                        gameState.turnsSinceSocial = 0;
                        const socialGain = 5 + Math.floor(Math.random() * 7);
                        const socialHappyGain = 3 + Math.floor(Math.random() * 5);
                        const socialCost = 0.8 + Math.random() * 2.5;
                        gameState.social = clamp(gameState.social + socialGain, 0, 100);
                        gameState.happiness = clamp(gameState.happiness + socialHappyGain, 0, 100);
                        gameState.wealth -= Math.round(socialCost * 10) / 10;
                        gameState.health = clamp(gameState.health - (1 + Math.floor(Math.random() * 2)), 0, 100);
                        logMsg = `🎉 你活跃于各种社交场合，社交+${socialGain}，快乐+${socialHappyGain}。花费${Math.round(socialCost*10)/10}万元。`;
                        logType = 'positive';
                        break;

                    case 'rest':
                        gameState.turnsSinceSocial++;
                        const restHappyGain = 4 + Math.floor(Math.random() * 6);
                        const restHealthGain = 1 + Math.floor(Math.random() * 3);
                        gameState.happiness = clamp(gameState.happiness + restHappyGain, 0, 100);
                        gameState.health = clamp(gameState.health + restHealthGain, 0, 100);
                        gameState.social = clamp(gameState.social - (1 + Math.floor(Math.random() * 2)), 0, 100);
                        logMsg = `🌴 你给自己放了个长假，快乐+${restHappyGain}，健康+${restHealthGain}。社交略有减少。`;
                        logType = 'neutral';
                        break;

                    case 'venture':
                        gameState.turnsSinceSocial++;
                        if (gameState.intelligence < 35) {
                            logMsg = '🚀 你的智力不足以应对创业的挑战，建议先学习提升。';
                            logType = 'negative';
                            gameState.happiness = clamp(gameState.happiness - 3, 0, 100);
                        } else {
                            const successRate = 0.35 + (gameState.intelligence - 35) * 0.008;
                            const isSuccess = Math.random() < successRate;
                            const ventureHealthCost = 3 + Math.floor(Math.random() * 4);
                            gameState.health = clamp(gameState.health - ventureHealthCost, 0, 100);
                            if (isSuccess) {
                                const profit = 8 + Math.random() * 25;
                                gameState.wealth += Math.round(profit * 10) / 10;
                                gameState.happiness = clamp(gameState.happiness + 8, 0, 100);
                                gameState.intelligence = clamp(gameState.intelligence + 3, 0, 100);
                                logMsg = `🚀 创业成功！你的项目大获成功，盈利${Math.round(profit*10)/10}万元！智力+3。`;
                                logType = 'positive';
                                showToast('🚀 创业大成功！');
                            } else {
                                const loss = 4 + Math.random() * 16;
                                gameState.wealth -= Math.round(loss * 10) / 10;
                                gameState.happiness = clamp(gameState.happiness - 8, 0, 100);
                                logMsg = `💥 创业失败，亏损${Math.round(loss*10)/10}万元。但经验宝贵，智力+1。`;
                                logType = 'negative';
                                gameState.intelligence = clamp(gameState.intelligence + 1, 0, 100);
                            }
                            updateCareer();
                        }
                        break;
                }

                addLog(logMsg, logType);

                // 年龄增长
                gameState.age++;
                gameState.year++;

                // 随机事件（概率触发）
                if (Math.random() < 0.45) {
                    triggerRandomEvent();
                }

                // 更新职业
                updateCareer();

                // 检查成就
                checkAchievements();

                // 检查结局
                checkEnding();

                // 更新UI
                updateAllUI();
            }

            // ==================== 成就系统 ====================
            function checkAchievements() {
                const ach = gameState.achievements;
                if (!ach.includes('first10') && gameState.wealth >= 10) {
                    ach.push('first10');
                    showToast('🏆 成就解锁：第一桶金 (财富达10万)');
                    addLog('🏆 成就解锁：第一桶金 — 财富达到10万元！', 'special');
                }
                if (!ach.includes('million') && gameState.wealth >= 100) {
                    ach.push('million');
                    showToast('🏆 成就解锁：百万富翁 (财富达100万)');
                    addLog('🏆 成就解锁：百万富翁 — 财富达到100万元！', 'special');
                }
                if (!ach.includes('scholar') && gameState.intelligence >= 90) {
                    ach.push('scholar');
                    showToast('🏆 成就解锁：学识渊博 (智力达90)');
                    addLog('🏆 成就解锁：学识渊博 — 智力达到90！', 'special');
                }
                if (!ach.includes('socialKing') && gameState.social >= 90) {
                    ach.push('socialKing');
                    showToast('🏆 成就解锁：社交达人 (社交达90)');
                    addLog('🏆 成就解锁：社交达人 — 社交达到90！', 'special');
                }
                if (!ach.includes('healthy') && gameState.health >= 95 && gameState.age > 40) {
                    ach.push('healthy');
                    showToast('🏆 成就解锁：钢铁之躯 (健康保持极高水平)');
                    addLog('🏆 成就解锁：钢铁之躯 — 中年仍保持极佳健康！', 'special');
                }
                if (!ach.includes('married') && gameState.relationship === '已婚') {
                    ach.push('married');
                    showToast('🏆 成就解锁：喜结连理');
                    addLog('🏆 成就解锁：喜结连理 — 步入婚姻殿堂！', 'special');
                }
                if (!ach.includes('parent') && gameState.hasChildren) {
                    ach.push('parent');
                    showToast('🏆 成就解锁：为人父母');
                    addLog('🏆 成就解锁：为人父母 — 迎接新生命！', 'special');
                }
                if (!ach.includes('longevity') && gameState.age >= 70) {
                    ach.push('longevity');
                    showToast('🏆 成就解锁：长寿之星 (活到70岁)');
                    addLog('🏆 成就解锁：长寿之星 — 迈入古稀之年！', 'special');
                }
                if (!ach.includes('allAbove60') &&
                    gameState.health > 60 && gameState.happiness > 60 &&
                    gameState.intelligence > 60 && getWealthPercent() > 40 && gameState.social > 60) {
                    ach.push('allAbove60');
                    showToast('🏆 成就解锁：全面发展 (全属性均衡优秀)');
                    addLog('🏆 成就解锁：全面发展 — 所有属性均衡且优秀！', 'special');
                }
            }

            // ==================== 结局检查 ====================
            function checkEnding() {
                if (gameState.gameOver) return;

                let ending = null;
                let endingIcon = '';
                let endingTitle = '';
                let endingType = '';
                let endingDesc = '';

                // 健康耗尽
                if (gameState.health <= 0) {
                    endingIcon = '💀';
                    endingTitle = '健康耗尽';
                    endingType = '悲剧结局';
                    endingDesc = `你在${gameState.age}岁时因健康恶化离世。身体是革命的本钱，可惜你没能好好照顾自己。`;
                    ending = 'health_failure';
                }
                // 快乐长期过低
                else if (gameState.consecutiveHappinessLow >= 3 && gameState.happiness <= 5) {
                    endingIcon = '😔';
                    endingTitle = '抑郁终老';
                    endingType = '悲剧结局';
                    endingDesc = `长期的抑郁情绪在${gameState.age}岁时将你击垮。人生需要快乐和希望。`;
                    ending = 'depression';
                }
                // 破产
                else if (gameState.wealth < -20 && gameState.age > 25) {
                    endingIcon = '📉';
                    endingTitle = '破产深渊';
                    endingType = '悲剧结局';
                    endingDesc = `巨额债务让你在${gameState.age}岁时彻底崩溃。财务管理是人生的重要课题。`;
                    ending = 'bankruptcy';
                }
                // 到达65岁退休
                else if (gameState.age >= 65) {
                    const wp = getWealthPercent();
                    if (gameState.wealth >= 500) {
                        endingIcon = '👑';
                        endingTitle = '富甲一方';
                        endingType = '辉煌结局';
                        endingDesc = `你在65岁退休时坐拥${Math.round(gameState.wealth)}万元财富，是名副其实的人生赢家！`;
                    } else if (gameState.intelligence >= 90 && gameState.social >= 70) {
                        endingIcon = '🎓';
                        endingTitle = '德高望重';
                        endingType = '卓越结局';
                        endingDesc = `智慧与品格兼备，你在${gameState.age}岁时已是受人尊敬的智者。`;
                    } else if (gameState.happiness >= 80 && gameState.social >= 75) {
                        endingIcon = '🌈';
                        endingTitle = '幸福人生';
                        endingType = '美满结局';
                        endingDesc = `快乐和温暖的人际关系是你最大的财富。你度过了幸福的一生。`;
                    } else if (gameState.health >= 70 && gameState.age >= 65) {
                        endingIcon = '🌳';
                        endingTitle = '健康长寿';
                        endingType = '平和结局';
                        endingDesc = `拥有健康的身体，你安然步入退休生活，享受平静的晚年。`;
                    } else if (gameState.wealth >= 100) {
                        endingIcon = '🏠';
                        endingTitle = '安稳退休';
                        endingType = '良好结局';
                        endingDesc = `积累了一定的财富，你在${gameState.age}岁时安然退休，生活无忧。`;
                    } else if (gameState.wealth < 5 && gameState.health < 40) {
                        endingIcon = '🍂';
                        endingTitle = '晚景凄凉';
                        endingType = '遗憾结局';
                        endingDesc = `没有足够的积蓄，身体也不太好，晚年的生活颇为艰难。`;
                    } else {
                        endingIcon = '🌅';
                        endingTitle = '平凡一生';
                        endingType = '普通结局';
                        endingDesc = `你度过了平凡而真实的一生，虽无大富大贵，但也是独一无二的人生。`;
                    }
                    ending = 'retirement';
                }
                // 年少有为（30岁前财富100万）
                else if (gameState.age <= 30 && gameState.wealth >= 100) {
                    endingIcon = '🌟';
                    endingTitle = '年少有为';
                    endingType = '传奇结局';
                    endingDesc = `年仅${gameState.age}岁便已积累百万财富！你的故事将被后人传颂！`;
                    ending = 'young_prodigy';
                }

                if (ending) {
                    gameState.gameOver = true;
                    gameState.gameEnding = ending;
                    showEndingScreen(endingIcon, endingTitle, endingType, endingDesc);
                    updateAllUI();
                }
            }

            function showEndingScreen(icon, title, type, desc) {
                const container = document.getElementById('endingContainer');
                const statsSummary = `
                    年龄：${gameState.age}岁 | 财富：${Math.round(gameState.wealth)}万元
                    健康：${Math.round(gameState.health)} | 快乐：${Math.round(gameState.happiness)}
                    智力：${Math.round(gameState.intelligence)} | 社交：${Math.round(gameState.social)}
                    职业：${gameState.career} | 关系：${gameState.relationship}
                    成就数：${gameState.achievements.length}
                `;
                container.innerHTML = `
                    <div class="ending-overlay">
                        <div class="ending-card">
                            <div class="ending-icon">${icon}</div>
                            <h2>${title}</h2>
                            <div class="ending-type">${type}</div>
                            <p class="ending-stats">${desc}</p>
                            <p class="ending-stats" style="font-size:0.78rem;color:#a0a8b8;">${statsSummary.replace(/\n/g, '<br>')}</p>
                            <button onclick="resetGame()">🔄 重新开始人生</button>
                        </div>
                    </div>
                `;
            }

            // ==================== 重置游戏 ====================
            function resetGame() {
                gameState.age = 18;
                gameState.year = 2024;
                gameState.health = 80;
                gameState.happiness = 70;
                gameState.intelligence = 30;
                gameState.wealth = 1;
                gameState.social = 40;
                gameState.career = '待业';
                gameState.careerLevel = 0;
                gameState.relationship = '单身';
                gameState.relationshipYears = 0;
                gameState.hasChildren = false;
                gameState.achievements = [];
                gameState.eventLog = [];
                gameState.gameOver = false;
                gameState.gameEnding = null;
                gameState.consecutiveHealthLow = 0;
                gameState.consecutiveHappinessLow = 0;
                gameState.turnsSinceSocial = 0;

                document.getElementById('endingContainer').innerHTML = '';
                document.getElementById('logEntries').innerHTML = `
                    <div class="log-entry neutral">🌟 你的人生开始了！18岁的你站在人生的十字路口，未来充满无限可能。</div>
                `;
                document.getElementById('toastContainer').innerHTML = '';

                const allBtns = document.querySelectorAll('.action-btn');
                allBtns.forEach(b => b.classList.remove('disabled'));

                updateCareer();
                updateAllUI();
                showToast('🔄 新的人生开始了！');
            }

            // 暴露到全局作用域
            window.performAction = performAction;
            window.resetGame = resetGame;

            // ==================== 初始化 ====================
            function initGame() {
                updateCareer();
                updateAllUI();
                document.getElementById('logEntries').innerHTML = `
                    <div class="log-entry neutral">🌟 你的人生开始了！18岁的你站在人生的十字路口，未来充满无限可能。</div>
                `;
            }

            initGame();

            console.log('🌍 地球Online - 模拟人生游戏已就绪');
            console.log('📋 每年选择一个行动，平衡各项属性，体验完整人生');
            console.log('🎯 目标：活出精彩人生，解锁各种结局和成就');
            console.log('💡 提示：注意属性平衡，健康是根本，快乐很重要！');
            console.log('👤 从18岁开始，尝试活到65岁退休，看看你能达成什么结局吧！');
        })();
    </script>
</body>
</html>
